<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skoodle AI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
height:100vh;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
color:white;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0b0f1a;
display:flex;
flex-direction:column;
padding:15px;
border-right:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:20px;
margin-bottom:20px;
font-weight:600;
color:#60a5fa;
}

.new-chat{
background:#2563eb;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
text-align:center;
}

.search{
padding:8px;
border-radius:6px;
border:none;
margin-bottom:10px;
background:#1f2937;
color:white;
}

.history{
flex:1;
overflow-y:auto;
}

.history-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
border-radius:6px;
margin-bottom:4px;
cursor:pointer;
}

.history-item:hover{
background:#1f2937;
}

.delete-btn{
cursor:pointer;
color:#aaa;
}

.delete-btn:hover{
color:#ff4d4d;
}

/* MAIN CHAT */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
}

/* MESSAGE ROW */

.msg-row{
display:flex;
margin-bottom:12px;
align-items:flex-end;
}

.msg-row.user{
justify-content:flex-end;
}

.msg-row.ai{
justify-content:flex-start;
}

/* AI AVATAR */

.ai-avatar{
width:32px;
height:32px;
border-radius:50%;
background:#2563eb;
display:flex;
align-items:center;
justify-content:center;
margin-right:8px;
font-size:14px;
}

/* MESSAGE BUBBLE */

.message{
max-width:60%;
padding:12px 14px;
border-radius:10px;
position:relative;
}

.user .message{
background:#2563eb;
}

.ai .message{
background:#1f2937;
}

/* MESSAGE TOOLS */

.msg-tools{
position:absolute;
top:-10px;
right:4px;
font-size:11px;
display:flex;
gap:6px;
opacity:0;
}

.message:hover .msg-tools{
opacity:1;
}

.msg-tools i{
cursor:pointer;
}

/* INPUT */

.input-area{
padding:15px;
border-top:1px solid rgba(255,255,255,0.05);
background:#0b0f1a;
}

.input-box{
display:flex;
background:#1f2937;
border-radius:10px;
padding:8px;
}

.input-box input{
flex:1;
border:none;
background:none;
color:white;
padding:10px;
outline:none;
}

.input-box button{
background:#2563eb;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
color:#9ca3af;
margin-top:8px;
}

/* SCROLLBAR */

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#2563eb;border-radius:6px}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<i class="fa fa-robot"></i> Skoodle AI
</div>

<div class="new-chat" onclick="newChat()">+ New Chat</div>

<input class="search" placeholder="Search chats..." onkeyup="searchChat(this.value)">

<div class="history" id="history"></div>

</div>

<!-- MAIN -->

<div class="main">

<div class="messages" id="chat"></div>

<div class="input-area">

<div class="input-box">
<input id="input" placeholder="Message Skoodle AI...">
<button onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
</div>

<div class="footer">
Skoodle AI can make mistakes. Check important info. See Cookie Preferences
</div>

</div>

</div>

<script>

/* DATASET */

const knowledge={
"hi":"Hello! 👋 I am Skoodle AI. How can I help you today?",
"hello":"Hi there! 😊 What can I assist you with?",
"how are you":"I'm just a program but I'm ready to help! 🤖",
"what is ai":"Artificial Intelligence allows machines to perform tasks requiring human intelligence.",
"tell me a joke":"😂 Why did the computer catch a cold? Because it left its Windows open!",
"best anime":"Attack on Titan, Naruto, and Death Note are great choices.",
"what is html":"HTML is the standard markup language used to create web pages.",
"what is css":"CSS is used to style web pages.",
"what is javascript":"JavaScript makes websites interactive.",
"how to study effectively":"Use focused sessions and take regular breaks."
};

/* CHAT STORAGE */

let chats=JSON.parse(localStorage.getItem("skoodle_chats"))||{};
let currentChat=null;

/* NEW CHAT */

function newChat(){

let id="chat_"+Date.now();

chats[id]={title:"New Chat",messages:[]};

currentChat=id;

saveChats();
loadHistory();

document.getElementById("chat").innerHTML="";

}

/* LOAD HISTORY */

function loadHistory(){

let history=document.getElementById("history");
history.innerHTML="";

for(let id in chats){

let div=document.createElement("div");
div.className="history-item";

let title=document.createElement("span");
title.innerText=chats[id].title;
title.onclick=()=>openChat(id);

let del=document.createElement("i");
del.className="fa fa-trash delete-btn";
del.onclick=(e)=>{e.stopPropagation();deleteChat(id)}

div.appendChild(title);
div.appendChild(del);

history.appendChild(div);

}

}

/* DELETE CHAT */

function deleteChat(id){

if(!confirm("Delete chat?")) return;

delete chats[id];

saveChats();
loadHistory();

}

/* OPEN CHAT */

function openChat(id){

currentChat=id;

let chat=document.getElementById("chat");
chat.innerHTML="";

chats[id].messages.forEach(m=>addMessage(m.text,m.type,false));

}

/* ADD MESSAGE */

function addMessage(text,type,save=true){

let chat=document.getElementById("chat");

let row=document.createElement("div");
row.className="msg-row "+type;

if(type==="ai"){

row.innerHTML=`
<div class="ai-avatar"><i class="fa fa-robot"></i></div>

<div class="message">

${text}

<div class="msg-tools">
<i class="fa fa-copy" onclick="copyMsg('${text}')"></i>
<i class="fa fa-edit" onclick="editMsg(this)"></i>
</div>

</div>
`;

}else{

row.innerHTML=`
<div class="message">

${text}

<div class="msg-tools">
<i class="fa fa-copy" onclick="copyMsg('${text}')"></i>
<i class="fa fa-edit" onclick="editMsg(this)"></i>
</div>

</div>
`;

}

chat.appendChild(row);
chat.scrollTop=chat.scrollHeight;

if(save && currentChat){

chats[currentChat].messages.push({text,type});

/* TITLE FROM FIRST USER MESSAGE */

if(type==="user" && chats[currentChat].messages.filter(m=>m.type==="user").length===1){

chats[currentChat].title=text.slice(0,30);

}

saveChats();
loadHistory();

}

}

/* SEND */

function sendMessage(){

let input=document.getElementById("input");
let text=input.value.trim().toLowerCase();

if(!text) return;

if(!currentChat)newChat();

addMessage(text,"user");

let reply=knowledge[text] || "🤖 I'm still learning. Try asking something else!";

setTimeout(()=>{

addMessage(reply,"ai");

},500);

input.value="";

}

/* COPY */

function copyMsg(text){
navigator.clipboard.writeText(text);
}

/* EDIT */

function editMsg(el){

let msg=el.closest(".message");

let text=prompt("Edit message",msg.innerText);

if(text)msg.childNodes[0].nodeValue=text;

}

/* SEARCH */

function searchChat(q){

q=q.toLowerCase();

document.querySelectorAll(".history-item").forEach(el=>{

el.style.display=el.innerText.toLowerCase().includes(q)?"flex":"none";

});

}

/* SAVE */

function saveChats(){
localStorage.setItem("skoodle_chats",JSON.stringify(chats));
}

loadHistory();

document.getElementById("input").addEventListener("keydown",e=>{
if(e.key==="Enter")sendMessage();
});

</script>

</body>
</html>
